<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería BTS – ETER KPOP MX</title>
<style>
body {
  margin: 0;
  background: #121212;
  font-family: 'Poppins', sans-serif;
  color: #fff;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content: space-between;
  padding: 12px 20px;
  background: linear-gradient(90deg, #7b5cff, #b44cff);
}

header .logo{
  font-weight:bold;
  font-size:20px;
}

header nav{
  display:flex;
  gap: 15px;
}

header nav a{
  text-decoration:none;
  color:white;
  font-weight:bold;
  padding: 6px 8px;
  border-radius:4px;
  /* completamente plano, sin sombra ni hover */
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: 30px auto;
  padding: 0 20px;
}

h1{
  text-align: center;
  margin-bottom: 20px;
}

/* GALERIA */
.grid-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 18px;
}

.grid-gallery img{
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
  transition: transform .3s;
}

.grid-gallery img:hover{
  transform: scale(1.05);
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  background: #1c1c26;
  font-size: 14px;
  color: #ccc;
  margin-top: 40px;
}
</style>
</head>
<body>

<header>
  <div class="logo">Galería BTS</div>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="tienda.html">Tienda</a>
  </nav>
</header>

<div class="container">
  <h1>Imágenes HD de BTS</h1>
  <div class="grid-gallery">
    <img src="https://wallpapers.com/images/featured/bts-utd6rlso6dvav5az.jpg" alt="BTS grupo">
    <img src="https://4kwallpapers.com/images/wallpapers/bts-jin-suga-j-hope-rm-jimin-v-bts-jungkook-k-pop-singers-3840x2160-8180.jpg" alt="BTS miembros">
    <img src="https://i.pinimg.com/736x/f4/4b/db/f44bdbdb8da4b8888bba0a071272ab85.jpg" alt="BTS estilo artístico">
  </div>
</div>

<div class="footer">
  © 2026 ETER KPOP MX — Imágenes externas usadas con fines demostrativos.
</div>

</body>
</html>
