<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ETER KPOP MX</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Nunito',Arial; margin:0; background:#121212; color:#fff; }
a { color:#7b5cff; text-decoration:none; }

.navbar { display:flex; align-items:center; justify-content:space-between; background:#1f1f1f; padding:12px 24px; border-bottom:1px solid #333; }
.navbar .logo { font-weight:bold; font-size:18px; display:flex; align-items:center; gap:8px; }
.navbar .logo img { height:24px; width:24px; border-radius:4px; object-fit:cover; }
.navbar nav a { margin-left:16px; font-weight:bold; font-size:14px; }

.container { max-width:800px; margin:30px auto; background:#1f1f1f; padding:30px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,.5); }
label { font-weight:bold; display:block; margin-top:15px; }
input, textarea, select { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #444; background:#222; color:#fff; box-sizing:border-box; }
input:focus, textarea:focus, select:focus { outline:none; border-color:#7b5cff; }

button { margin-top:20px; padding:12px 20px; border:none; background:#7b5cff; color:white; font-weight:bold; border-radius:8px; cursor:pointer; }
button:hover { opacity:.9; }

.preview { margin-top:20px; padding:20px; background:#181818; border-radius:12px; display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }

.product-preview {
  background:#faf7ff;
  color:#222;
  padding:18px;
  border-radius:14px;
  text-align:center;
  width:100%;
  max-width:260px;
  min-height:320px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  margin:auto;
  box-sizing:border-box;
}
.product-preview img { width:100%; height:140px; object-fit:cover; border-radius:8px; }
.product-preview h3 { margin:12px 0 8px 0; font-size:16px; }
.product-preview p { font-size:14px; color:#444; min-height:60px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; text-overflow:ellipsis; }
.product-preview .price { font-size:20px; font-weight:bold; margin:10px 0; color:#8b7cff; }
.product-preview .badge { background:#ff4d4d; color:white; padding:4px 8px; border-radius:6px; font-size:12px; display:inline-block; margin-bottom:8px; }
.code-box { background:#222; padding:10px; border-radius:8px; font-family:monospace; white-space:pre-wrap; position:relative; margin-top:20px; }
.copy-btn { position:absolute; top:10px; right:10px; background:#7b5cff; color:#fff; border:none; padding:4px 8px; border-radius:6px; cursor:pointer; }
.copy-btn:hover { opacity:.9; }
</style>
</head>
<body>

<script>
// CLAVE DE ACCESO
const clave = "panochonas12";
let intentos = 0;

function solicitarClave() {
  if(sessionStorage.getItem("adminAutorizado") === "true") return;
  let pass = prompt("Introduce la clave de acceso a Admin:");
  if(pass === clave){
    sessionStorage.setItem("adminAutorizado","true");
  } else {
    intentos++;
    alert("Clave incorrecta.");
    if(intentos < 3){
      solicitarClave();
    } else {
      alert("No tienes permiso para entrar.");
      window.location.href = "index.html";
    }
  }
}
solicitarClave();
</script>

<div class="navbar">
  <div class="logo">
    <img src="https://yt3.ggpht.com/rGD4n7Nq_CQfuIV0Ig_iIIbv30gVoKEcqcn1tsbWKZVWBA9Ni1W5TVhp5vRMKplK0uBK7S4Ikw=s600-c-k-c0x00ffffff-no-rj-rp-mo" />
    ETER KPOP MX Admin
  </div>
  <nav>
    <a href="#">Dashboard</a>
    <a href="#">Herramientas</a>
    <a href="#">Configuración</a>
  </nav>
</div>

<div class="container">
<h1>Generador de productos</h1>

<label>Título del producto</label>
<input id="titulo">
<label>Descripción</label>
<textarea id="descripcion"></textarea>
<label>Link del producto</label>
<input id="link">
<label>Link de imagen</label>
<input id="imagen">
<label>Precio (solo número)</label>
<input id="precio">
<label>Calificación (ejemplo: 4.6)</label>
<input id="rating">
<label>Número de calificaciones</label>
<input id="reviews">
<label>Badge (opcional)</label>
<select id="badge">
  <option value="">Ninguno</option>
  <option value="Nuevo">Nuevo</option>
  <option value="Popular">Popular</option>
  <option value="Recomendado">Recomendado</option>
</select>

<button onclick="vistaPrevia()">Vista previa</button>
<button onclick="generarHTML()" style="margin-left:10px;">Generar HTML</button>

<h2>Vista previa</h2>
<div class="preview" id="preview"></div>

<h2>HTML listo para copiar</h2>
<div id="htmlOutput"></div>

</div>

<script>
let productoActual = null;

// Generar la vista previa
function vistaPrevia(){
  const titulo = document.getElementById("titulo").value.trim()
  const descripcion = document.getElementById("descripcion").value.trim()
  const link = document.getElementById("link").value.trim()
  const imagen = document.getElementById("imagen").value.trim()
  const precio = document.getElementById("precio").value.trim()
  const rating = parseFloat(document.getElementById("rating").value)
  const reviews = document.getElementById("reviews").value.trim()
  const badge = document.getElementById("badge").value

  if(!titulo || !link || !imagen || !precio){ alert("Llena los campos obligatorios"); return; }

  let estrellas = ''
  for(let i=0;i<5;i++){
    if(rating>=i+1) estrellas+='★'
    else if(rating>=i+0.5) estrellas+='☆'
    else estrellas+='☆'
  }

  productoActual = {titulo, descripcion, link, imagen, precio, rating, reviews, badge, estrellas}

  const htmlPreview = `<div class="product-preview">
${badge?`<span class="badge">${badge}</span>`:''}
<img src="${imagen}" alt="${titulo}" />
<h3>${titulo}</h3>
<p>${descripcion}</p>
<div style="font-size:18px;color:#ffd700;margin:8px 0;">${estrellas} <span style="color:#ccc;font-size:14px;">(${rating} • ${reviews} calificaciones)</span></div>
<div class="price">$${precio} MXN</div>
<a href="${link}" target="_blank"><button>Ver en Mercado Libre</button></a>
</div>`

  document.getElementById("preview").innerHTML = htmlPreview
  document.getElementById("htmlOutput").innerHTML = '' // limpiar HTML generado
}

// Generar HTML listo para copiar
function generarHTML(){
  if(!productoActual){ alert("Primero haz vista previa"); return; }

  const html = `<div class="product">
${productoActual.badge?`<span class="badge">${productoActual.badge}</span>`:''}
<img src="${productoActual.imagen}" alt="${productoActual.titulo}" />
<h3>${productoActual.titulo}</h3>
<p>${productoActual.descripcion}</p>
<div class="stars">${productoActual.estrellas} <span style="color:#ccc;font-size:14px;">(${productoActual.rating} • ${productoActual.reviews} calificaciones)</span></div>
<div class="price">$${productoActual.precio} MXN</div>
<a href="${productoActual.link}" target="_blank"><button>Ver en Mercado Libre</button></a>
</div>
<div class="code-box">
<button class="copy-btn" onclick="copiarHTML()">Copiar código</button>
<pre>${html.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
</div>`

  document.getElementById("htmlOutput").innerHTML = html
}

// Copiar el HTML al portapapeles
function copiarHTML(){
  const code = document.querySelector("#htmlOutput pre")
  if(!code){ alert("No hay código para copiar"); return; }
  navigator.clipboard.writeText(code.innerText)
    .then(()=>alert("Código copiado al portapapeles"))
    .catch(()=>alert("Error al copiar"))
}
</script>

</body>
</html>
